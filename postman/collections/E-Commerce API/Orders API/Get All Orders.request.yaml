$kind: http-request
url: "{{base_url}}{{api_version}}/orders"
method: GET
description: Retrieves a paginated list of all orders.
headers:
  Authorization: Bearer {{access_token}}
queryParams:
  - key: page
    value: "1"
    disabled: true
    description: "Page number for pagination (default: 1)"
  - key: limit
    value: "20"
    disabled: true
    description: "Number of items per page (default: 20, max: 100)"
  - key: status
    value: "pending,shipped"
    disabled: true
    description: "Filter orders by status (pending, shipped, delivered, cancelled)"
  - key: customerId
    value: "60d5ecb8b392d7001f3e9b11"
    disabled: true
    description: "Filter orders belonging to a specific customer ID"
  - key: sort
    value: "createdAt:desc"
    disabled: true
    description: "Sort results by field and order. Format `field:order` (asc or desc)"
  - key: total_min
    value: "100.00"
    disabled: true
    description: "Filter orders where total amount is strictly greater than or equal to this value"
